<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SecureAuth — Вход</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            padding: 20px;
            overflow: hidden;
        }

        /* Animated background circles */
        .bg-circle {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: float 8s ease-in-out infinite;
            pointer-events: none;
        }
        .bg-circle:nth-child(1) {
            width: 300px; height: 300px;
            background: #667eea;
            top: -100px; left: -100px;
            animation-delay: 0s;
        }
        .bg-circle:nth-child(2) {
            width: 250px; height: 250px;
            background: #764ba2;
            bottom: -80px; right: -80px;
            animation-delay: -3s;
        }
        .bg-circle:nth-child(3) {
            width: 200px; height: 200px;
            background: #f093fb;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        .container {
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 1;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 40px 28px 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.35);
        }

        .logo-icon svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        .logo h1 {
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            margin-top: 4px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 28px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            color: rgba(255, 255, 255, 0.45);
            font-size: 14px;
            font-weight: 600;
            border-radius: 11px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            background: none;
            outline: none;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        /* Forms */
        .form {
            display: none;
        }

        .form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            margin-bottom: 18px;
            position: relative;
        }

        .input-group label {
            display: block;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            fill: rgba(255, 255, 255, 0.3);
            transition: fill 0.3s ease;
            pointer-events: none;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 14px 14px 44px;
            background: rgba(255, 255, 255, 0.06);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .input-wrapper input:focus {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.08);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        .input-wrapper input:focus + svg,
        .input-wrapper input:focus ~ svg {
            fill: #667eea;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-password svg {
            position: static;
            transform: none;
            width: 20px;
            height: 20px;
            fill: rgba(255, 255, 255, 0.3);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
            margin-top: 6px;
            position: relative;
            overflow: hidden;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }

        .btn:active::after {
            width: 300px;
            height: 300px;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Loading spinner */
        .btn .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        .btn.loading .btn-text { display: none; }
        .btn.loading .spinner { display: inline-block; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error / Success messages */
        .message {
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            animation: fadeIn 0.3s ease;
            line-height: 1.5;
        }

        .message.error {
            background: rgba(255, 71, 87, 0.15);
            border: 1px solid rgba(255, 71, 87, 0.3);
            color: #ff6b7a;
            display: block;
        }

        .message.success {
            background: rgba(46, 213, 115, 0.15);
            border: 1px solid rgba(46, 213, 115, 0.3);
            color: #5ddb8d;
            display: block;
        }

        .message.warning {
            background: rgba(255, 165, 2, 0.15);
            border: 1px solid rgba(255, 165, 2, 0.3);
            color: #ffb84d;
            display: block;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.25);
            font-size: 11px;
        }

        .footer a {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
        }

        /* Checkbox */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
        }

        .checkbox-group input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.06);
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .checkbox-group input[type="checkbox"]:checked {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent;
        }

        .checkbox-group input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            left: 6px;
            top: 3px;
            width: 5px;
            height: 9px;
            border: solid #fff;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .checkbox-group label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            cursor: pointer;
        }

        /* Password strength */
        .password-hint {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 6px;
            padding-left: 2px;
        }

        /* Shake animation for errors */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }

        .shake {
            animation: shake 0.4s ease;
        }
    </style>
</head>
<body>
    <!-- Background effects -->
    <div class="bg-circle"></div>
    <div class="bg-circle"></div>
    <div class="bg-circle"></div>

    <div class="container">
        <div class="card">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 2.18l7 3.12v4.7c0 4.67-3.14 9.01-7 10.16-3.86-1.15-7-5.49-7-10.16V6.3l7-3.12zM11 7v2h2V7h-2zm0 4v6h2v-6h-2z"/></svg>
                </div>
                <h1>SecureAuth</h1>
                <p>Безопасная авторизация</p>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Вход</button>
                <button class="tab" onclick="switchTab('register')">Регистрация</button>
            </div>

            <!-- Login Form -->
            <form class="form active" id="loginForm" onsubmit="handleLogin(event)">
                <div id="loginMsg" class="message"></div>

                <div class="input-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <input type="email" id="loginEmail" placeholder="your@email.com" required autocomplete="email">
                        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                    </div>
                </div>

                <div class="input-group">
                    <label>Пароль</label>
                    <div class="input-wrapper">
                        <input type="password" id="loginPassword" placeholder="Введите пароль" required autocomplete="current-password">
                        <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/></svg>
                        <button type="button" class="toggle-password" onclick="togglePass('loginPassword', this)">
                            <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                        </button>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">Запомнить меня</label>
                </div>

                <button type="submit" class="btn" id="loginBtn">
                    <span class="btn-text">Войти</span>
                    <div class="spinner"></div>
                </button>
            </form>

            <!-- Register Form -->
            <form class="form" id="registerForm" onsubmit="handleRegister(event)">
                <div id="registerMsg" class="message"></div>

                <div class="input-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <input type="email" id="regEmail" placeholder="your@email.com" required autocomplete="email">
                        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                    </div>
                </div>

                <div class="input-group">
                    <label>Имя пользователя</label>
                    <div class="input-wrapper">
                        <input type="text" id="regName" placeholder="Ваше имя" required autocomplete="name">
                        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    </div>
                </div>

                <div class="input-group">
                    <label>Пароль</label>
                    <div class="input-wrapper">
                        <input type="password" id="regPassword" placeholder="Придумайте пароль" required autocomplete="new-password">
                        <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/></svg>
                        <button type="button" class="toggle-password" onclick="togglePass('regPassword', this)">
                            <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                        </button>
                    </div>
                    <div class="password-hint">Минимум 1 символ</div>
                </div>

                <div class="input-group">
                    <label>Подтвердите пароль</label>
                    <div class="input-wrapper">
                        <input type="password" id="regPasswordConfirm" placeholder="Повторите пароль" required autocomplete="new-password">
                        <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/></svg>
                        <button type="button" class="toggle-password" onclick="togglePass('regPasswordConfirm', this)">
                            <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                        </button>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="agreeTerms" required>
                    <label for="agreeTerms">Согласен с условиями</label>
                </div>

                <button type="submit" class="btn" id="regBtn">
                    <span class="btn-text">Создать аккаунт</span>
                    <div class="spinner"></div>
                </button>
            </form>
        </div>

        <div class="footer">
            <p>&copy; 2026 SecureAuth — Ваша безопасность наш приоритет</p>
        </div>
    </div>

    <script>
        // "Database" in localStorage
        function getUsers() {
            try {
                return JSON.parse(localStorage.getItem('secureauth_users') || '{}');
            } catch {
                return {};
            }
        }

        function saveUsers(users) {
            localStorage.setItem('secureauth_users', JSON.stringify(users));
        }

        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
            });
            document.getElementById('loginForm').classList.toggle('active', tab === 'login');
            document.getElementById('registerForm').classList.toggle('active', tab === 'register');
            hideMsg('loginMsg');
            hideMsg('registerMsg');
        }

        // Toggle password visibility
        function togglePass(inputId, btn) {
            const input = document.getElementById(inputId);
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            const eyeSvg = isPassword
                ? '<svg viewBox="0 0 24 24"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></svg>'
                : '<svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>';
            btn.innerHTML = eyeSvg;
        }

        // Show message
        function showMsg(id, text, type) {
            const el = document.getElementById(id);
            el.className = 'message ' + type;
            el.innerHTML = text;
            el.style.display = 'block';
        }

        function hideMsg(id) {
            const el = document.getElementById(id);
            el.style.display = 'none';
            el.className = 'message';
        }

        // Fake loading
        function fakeLoading(btnId) {
            return new Promise(resolve => {
                const btn = document.getElementById(btnId);
                btn.classList.add('loading');
                btn.disabled = true;
                setTimeout(() => {
                    btn.classList.remove('loading');
                    btn.disabled = false;
                    resolve();
                }, 1500);
            });
        }

        // Login handler — rickroll!
        async function handleLogin(e) {
            e.preventDefault();
            hideMsg('loginMsg');

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showMsg('loginMsg', 'Заполните все поля', 'error');
                return;
            }

            await fakeLoading('loginBtn');

            showMsg('loginMsg', '✓ Авторизация успешна! Перенаправляем...', 'success');

            setTimeout(() => {
                window.location.href = 'https://youtu.be/dQw4w9WgXcQ?si=DYVKNegBiphBKV2z';
            }, 1200);
        }

        // Register handler — the prank
        async function handleRegister(e) {
            e.preventDefault();
            hideMsg('registerMsg');

            const email = document.getElementById('regEmail').value.trim();
            const name = document.getElementById('regName').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regPasswordConfirm').value;

            if (!email || !name || !password || !confirmPassword) {
                showMsg('registerMsg', 'Заполните все поля', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showMsg('registerMsg', 'Пароли не совпадают', 'error');
                document.getElementById('registerForm').classList.add('shake');
                setTimeout(() => document.getElementById('registerForm').classList.remove('shake'), 400);
                return;
            }

            await fakeLoading('regBtn');

            const users = getUsers();

            // Check if email already registered
            if (users[email]) {
                showMsg('registerMsg', '⚠ Этот email уже зарегистрирован', 'warning');
                return;
            }

            // THE PRANK: Check if password is already used by someone
            for (const [existingEmail, userData] of Object.entries(users)) {
                if (userData.password === password) {
                    showMsg('registerMsg',
                        '🔒 <b>Ошибка безопасности!</b><br>Этот пароль уже используется пользователем <b>' + existingEmail + '</b>.<br>Пожалуйста, выберите другой пароль.',
                        'error'
                    );
                    document.getElementById('registerForm').classList.add('shake');
                    setTimeout(() => document.getElementById('registerForm').classList.remove('shake'), 400);
                    return;
                }
            }

            // Save user
            users[email] = { name: name, password: password };
            saveUsers(users);

            showMsg('registerMsg', '✓ Аккаунт успешно создан! Теперь войдите в систему.', 'success');

            // Clear form
            document.getElementById('regEmail').value = '';
            document.getElementById('regName').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regPasswordConfirm').value = '';
            document.getElementById('agreeTerms').checked = false;

            // Switch to login after delay
            setTimeout(() => switchTab('login'), 2000);
        }
    </script>
</body>
</html>
